name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # Triggers on every push to main
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

# Sets permissions so the workflow can push to gh-pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Node.js (matches Vite 5 requirements)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the site
      - name: Build
        run: npm run build

      # 5. Deploy dist/ to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: 'Deploy: ${{ github.event.head_commit.message }}'
          force_orphan: true    # keeps gh-pages history clean
